# ──────────────────────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ──────────────────────────────────────────────────────────────
# GitHub
# ──────────────────────────────────────────────────────────────
github.token=${GITHUB_TOKEN:}
github.api.base-url=https://api.github.com

# ──────────────────────────────────────────────────────────────
# OpenAI
# ──────────────────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:500}

# ──────────────────────────────────────────────────────────────
# RepoLens limits
# ──────────────────────────────────────────────────────────────
# Files larger than this (in bytes) are rejected for summarization
repolens.max-file-size-bytes=${MAX_FILE_SIZE_BYTES:100000}
# Content is truncated to this many characters before sending to OpenAI
repolens.max-content-chars=80000

# ──────────────────────────────────────────────────────────────
# Jackson – preserve Python API snake_case contract
# ──────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE

# ──────────────────────────────────────────────────────────────
# Thymeleaf
# ──────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
